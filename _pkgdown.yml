url: https://contefranz.github.io/OpTop/

template:
  bootstrap: 5
  math-rendering: katex

navbar:
  structure:
    left: [intro, reference, news]
    right: [github]

home:
  title: OpTop
  description: >
    Parametric tests and discrepancy indices to select the optimal number of
    topics and assess goodness-of-fit across topic models in R.
  sidebar:
    structure: [links, license, citation, authorlist, dev]
    components:
      authorlist:
        title: Authors
        text: |
          Francesco Grossetti <a href="https://orcid.org/0000-0002-5130-7745" target="orcid.widget" aria-label="ORCID iD for Francesco Grossetti"><span class="fab fa-orcid orcid" aria-hidden="true"></span></a>| Author, maintainer.

          Craig M. Lewis <a href="https://orcid.org/0000-0001-8734-1702" target="orcid.widget" aria-label="ORCID iD for Craig M. Lewis"><span class="fab fa-orcid orcid" aria-hidden="true"></span></a>| Author.

news:
  cran_dates: false

reference:
  - title: Optimal number of topics
    desc: Parametric selection of the topic count that best describes the corpus.
    contents:
      - optimal_topic

  - title: Goodness-of-fit indices
    desc: Regression-style discrepancy indices and grid summaries for topic-model fits.
    contents:
      - optop_index
      - optop_index_table

  - title: Harmonized comparisons across K
    desc: Fixed partition and baseline so all indices share a common support.
    contents:
      - optop_make_partition
      - optop_make_baseline

  - title: Held-out validation and diagnostics
    desc: >-
      Score independent evaluation documents, select the smallest sufficient
      K, and test for structured residual bias.
    contents:
      - optop_index_holdout
      - optop_gain_table
      - optop_moment_test

  - title: Utilities
    desc: Simulate corpora, shard very large ones, and wrap external engines.
    contents:
      - sim_dfm
      - optop_corpus
      - optop_warplda

  - title: Deprecated
    desc: Legacy redundant-topic diagnostics, scheduled for removal before v1.0.0.
    contents:
      - topic_stability
      - agg_topic_stability
      - agg_document_stability
      - topic_match
      - get_topic_models
